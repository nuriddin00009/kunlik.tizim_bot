<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Moliya Monitoring</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 15px; }
        button { width: 100%; padding: 12px; margin: 5px 0; border: none; border-radius: 8px; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h3>💰 Moliyaviy Operatsiyalar</h3>
        <input type="number" id="amount" placeholder="Summani kiriting" style="width: 100%; padding: 10px;">
        <button onclick="sendAction('kirim')" style="background: green;">Kirim (+)</button>
        <button onclick="sendAction('chiqim')" style="background: red;">Chiqim (-)</button>
        <button onclick="showHistory()" style="background: blue;">📊 Oxirgi operatsiyalar</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function sendAction(type) {
            let amount = document.getElementById('amount').value;
            tg.sendData(JSON.stringify({action: "add_transaction", type: type, amount: amount}));
        }

        function showHistory() {
            tg.sendData(JSON.stringify({action: "get_history"}));
        }
    </script>
</body>
</html>
