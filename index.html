<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moliya Tizimi</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #333; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        button { width: 100%; padding: 12px; background: #2c3e50; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .nav { display: flex; gap: 10px; margin-bottom: 20px; }
        .nav button { background: #3498db; }
    </style>
</head>
<body>
    <div class="container">
        <h2>💰 Moliya Boshqaruvi</h2>
        
        <div class="nav">
            <button onclick="showSection('home')">Asosiy</button>
            <button onclick="showSection('cards')">Kartalar</button>
        </div>

        <div id="home" class="card">
            <h3>Balans: 0 UZS</h3>
            <p>Bugungi xarajatlaringiz: 0 UZS</p>
        </div>

        <div id="cards" class="card" style="display:none;">
            <h3>Yangi Karta Qo'shish</h3>
            <input type="text" id="card_name" placeholder="Karta nomi (masalan: Uzcard)">
            <button onclick="addCard()">Saqlash</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function showSection(id) {
            document.getElementById('home').style.display = (id === 'home') ? 'block' : 'none';
            document.getElementById('cards').style.display = (id === 'cards') ? 'block' : 'none';
        }

        function addCard() {
            let name = document.getElementById('card_name').value;
            if(name) {
                tg.sendData(JSON.stringify({action: "add_card", name: name}));
            }
        }
    </script>
</body>
</html>
