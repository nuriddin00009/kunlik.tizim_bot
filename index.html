<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Shaxsiy Moliya</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        button { width: 100%; padding: 10px; background: #0088cc; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>💰 Mening Moliyam</h2>
    <div class="card">
        <h3>Balans: <span id="balance">0</span> UZS</h3>
    </div>
    <div class="card">
        <input type="text" id="card_name" placeholder="Karta nomi (masalan: Kapital)">
        <button onclick="addCard()">Karta qo'shish</button>
    </div>
    
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        function addCard() {
            let name = document.getElementById('card_name').value;
            tg.sendData(JSON.stringify({action: "add_card", name: name}));
        }
    </script>
</body>
</html>
