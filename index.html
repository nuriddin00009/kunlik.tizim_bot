const palettes = [
  'linear-gradient(135deg,#1f2a4d,#3a4a7d)',

function hashColor(name){
  let h = 0;
  for(let i=0;i<name.length;i++) h = name.charCodeAt(i) + ((h<<5)-h);
  return palettes[Math.abs(h) % palettes.length];
}

const cardsRow = document.getElementById('cardsRow');
function renderCards(){
  cardsRow.innerHTML = '';
  state.cards.forEach(c=>{
    const el = document.createElement('div');
    el.className = 'bankcard';
    el.style.background = hashColor(c.name);
    el.innerHTML = 
      <div class="chip"></div>
      <div class="dots">•••• •••• ••••</div>
      <div>
        <div class="name">${c.name}</div>
        <div class="bal">${fmt(c.balance)} so'm</div>
      </div>;
    cardsRow.appendChild(el);
  });
  const addTile = document.createElement('div');
  addTile.className = 'addcard-tile';
  addTile.textContent = '+ Karta qo\'shish';
  addTile.onclick = () => openCardSheet();
  cardsRow.appendChild(addTile);
}
renderCards();

const txnList = document.getElementById('txnList');
if(state.transactions && state.transactions.length){

function openSheet(type){
  if(!state.cards.length){
    tg.showAlert("Avval karta qo'shing.");

  }
  document.getElementById('txnTitle').textContent = type === 'kirim' ? "Kirim qo'shish" : "Chiqim qo'shish";
  document.getElementById('txnConfirmBtn').dataset.type = type;
  const sel = document.getElementById('txnCardSelect');
  sel.innerHTML = state.cards.map(c => <option value="${c.id}">${c.name} — ${fmt(c.balance)} so'm</option>).join('');
  document.getElementById('overlayTxn').classList.add('show');
}
function openCardSheet(){
  document.getElementById('overlayCard').classList.add('show');
}
function closeSheet(id){
  document.getElementById(id).classList.remove('show');
}

function submitCard(){
  const name = document.getElementById('cardNameInput').value.trim();
  if(!name){ tg.showAlert("Karta nomini kiriting."); return; }
  tg.sendData(JSON.stringify({ action:'add_card', name }));
}

function submitTxn(){
  const type = document.getElementById('txnConfirmBtn').dataset.type;
  const card_id = parseInt(document.getElementById('txnCardSelect').value, 10);
  const amount = parseInt(document.getElementById('txnAmount').value, 10);
  const note = document.getElementById('txnNote').value.trim();
  if(!amount || amount <= 0){ tg.showAlert("Summani to'g'ri kiriting."); return; }
  tg.sendData(JSON.stringify({ action: type, card_id, amount, note }));
}
